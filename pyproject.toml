[project]
name = "cellsmap"
version = "0.1.0"
description = ""
authors = [
    {name = "", email = ""},
]

dependencies = [
    "pytest>=8.2.2",
    "pathlib>=1.0.1",
    "numpy>=1.2.3",
    "bioio==1.0.1",
    "bioio-ome-tiff>=1.0.0",
    "bioio-base>=1.0.1",
    "bioio-ome-zarr==1.0.1",
    "ngff-zarr==0.10.2",
    "matplotlib>=3.10",
    "notebook==7.2.1",
    "numdifftools==0.9.41",
    "pandas==2.2.2",
    "scikit-learn==1.5.1",
    "sympy==1.13.1",
    "scikit-image==0.22.0",
    "scipy==1.13.1",
    "ipykernel>=6.29.5",
    "monai",
    "jupyter>=1.0.0",
    "cyto-dl>=0.4.0",
    "fire>=0.6.0",
    "tqdm>=4.66.5",
    # specifying wasmtime < 23.0 is currently needed because our slurm nodes are on Ubuntu 18 and don't have GLIBC_2.28
    "wasmtime<22.0",
    "seaborn>=0.13.2",
    "bioio-sldy>=1.0.2",
]
requires-python = "<3.11,>=3.10"
readme = "README.md"
license = {text = "AISL"}

[project.optional-dependencies]
pytorch = [
    # moving pytorch to an optional dependency because it does not
    # install on non-linux machines
    "torch @ https://download.pytorch.org/whl/cu116/torch-1.13.1%2Bcu116-cp310-cp310-linux_x86_64.whl",
]

[build-system]
requires = ["pdm-pep517>=1.0"]
build-backend = "pdm.pep517.api"

[tool.pytest.ini_options]
testpaths = "tests/"


[tool.pdm]
