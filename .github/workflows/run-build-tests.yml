name: run-build-tests

on:
  push:
    branches-ignore:
      # Don't run on the merge queue; it causes issues with concurrency settings
      - "gh-readonly-queue/**"
  merge_group:
  workflow_dispatch:

# Cancel actions when new commits are pushed to PR
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-build-tests:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout the repo
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.7.1"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version-file: "pyproject.toml"

    - name: Run pytest
      run: uv run --locked pytest tests -v

    - name: Run import test
      # To catch circular import errors, it's important to isolate this test
      # from the rest. Issue #1058 was caused by a circular import that was
      # hidden in a regular `pytest tests`.
      run: uv run --locked pytest tests/endo_pipeline/test_import_workflows.py -v
