name: "Imaging Experiment"

description: "Create image data handoff"

title: "Brief description of live imaging experiment"

labels: []

projects: ["aics-int/40"]

body:

- type: input
  attributes:
    label: Barcode
    description: Plate barcode
    placeholder: barcode
  validations:
    required: true

- type: input
  attributes:
    label: Date
    description: Experiment start date formatted as YYYYMMDD
    placeholder: YYYYMMDD
  validations:
    required: true

- type: textarea
  attributes:
    label: Path
    description: What is the path to the data?
    placeholder: allen/aics/...
  validations:
    required: true

- type: textarea
  attributes:
    label: Purpose
    description: What is the purpose of this experiment? Why are we doing this experiment?
    placeholder: 1 - 3 sentences describing the purpose for the experiment
  validations:
    required: true

- type: textarea
  attributes:
    label: Description
    description: Experiment description, including a copy of the plate layout.
    placeholder: description
  validations:
    required: true

- type: input
  attributes:
    label: OneNote
    description: OneNote link to experiment page
    placeholder: link
  validations:
    required: true

- type: dropdown
  attributes:
    label: Cell line(s)
    description: Select cell line(s) used in this experiment
    multiple: true
    options:
      - AICS-12 (TUBA1B)
      - AICS-126
      - CDH5
      - Mito
  validations:
    required: true

- type: input
  attributes:
    label: Flow history
    description: What was the flow rate prior to imaging
    placeholder: dyn/cm
  validations:
    required: true

- type: input
  attributes:
    label: Initial flow rate
    description: What was the flow rate at the start of imaging
    placeholder: dyn/cm
  validations:
    required: true

- type: input
  attributes:
    label: Flow rate change
    description: Was the flow rate changed? If so, what was the flow rate and between which frames was it changed?
    placeholder: dyn/cm, between frames X and Y
  validations:
    required: true

- type: checkboxes
  attributes:
    label: Experimental conditions
    description: Labels to annotate the dataset with
    options:
      - label: fixed
      - label: live
      - label: timelapse

- type: dropdown
  attributes:
    label: Microscope
    description: Select which microscope will be used in this experiment
    multiple: true
    options:
      - Nikon0
      - 3i

- type: dropdown
  attributes:
    label: Objective
    description: Select which magnification was used in this experiment
    multiple: true
    options:
      - 20x
      - 40x
