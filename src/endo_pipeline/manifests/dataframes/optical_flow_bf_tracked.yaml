name: optical_flow_bf_tracked
workflow: compute_optical_flow_feats
parameters:
  crop_pattern: tracked
  channel: BF
  max_dt: 1
  intensity_percentile: 0
  attachment: 2.5
  ema_alphas: [0.1]
  speed_threshold: 1.0
columns:
  start_x: X-coordinate of upper left corner of patch (crop) in pixels (zarr resolution level 1)
  position: Zarr file position (FOV) of the corresponding segmentation or patch (crop)
  frame_number: Timepoint (unit = frames)
  end_y: Y-coordinate of lower right corner of patch (crop) in pixels (zarr resolution level 1)
  track_id: Track ID assigned by the tracking algorithm
  start_y: Y-coordinate of upper left corner of patch (crop) in pixels (zarr resolution level 1)
  end_x: X-coordinate of lower right corner of patch (crop) in pixels (zarr resolution level 1)
  dataset: Name of dataset
  crop_index: Unique integer index of a patch (crop) trajectory across dataset, FOV, and XY-position
  track_duration: Number of timepoints in the track
  is_included: True if track passes all filtering criteria and is included in final dataset, False otherwise
  duration_minutes: ''
  timepoint: ''
  optical_flow_mean_speed_dt1: Mean per-pixel speed (px/frame) of the optical flow vectors in a crop
  optical_flow_mean_unit_vector_dt1: Mean unit vector coherence for flow field (no EMA smoothing) where
    0 = random and 1 = aligned
  optical_flow_std_speed_dt1: Standard deviation of per-pixel speed (px/frame) of the optical flow vectors
    in a crop
  optical_flow_mean_angle_dt1: Mean angle (radians) of optical flow vectors in a crop
  optical_flow_angle_std_dt1: Standard deviation of the angles (radians) of optical flow vectors in
    a crop
  optical_flow_mean_u_dt1: Mean horizontal (x) optical-flow component (px/frame)
  optical_flow_mean_v_dt1: Mean vertical (y) optical-flow component (px/frame)
  optical_flow_std_u_dt1: Standard deviation of horizontal (x) optical-flow components (px/frame)
  optical_flow_std_v_dt1: Standard deviation of vertical (y) optical-flow components (px/frame)
  speed_above_1_count_dt1: Number of pixels whose speed exceeds the threshold for fast coherence feature
  optical_flow_mean_unit_vector_fast_dt1: Mean unit vector coherence over fast pixels only (no EMA smoothing)
    where 0 = random and 1 = aligned
  optical_flow_radial_coherence_dt1: Mean dot product of unit flow with unit radial vector where -1
    = inward, +1 = outward, and 0 = no radial preference
  optical_flow_radial_coherence_weighted_dt1: Distance-weighted radial coherence emphasizing peripheral
    pixels
  ema005_optical_flow_mean_unit_vector_dt1: Mean unit vector coherence with EMA smoothing (alpha = 0.05)
  ema005_optical_flow_mean_unit_vector_fast_dt1: Mean unit vector coherence over fast pixels with EMA
    smoothing (alpha = 0.05)
  ema01_optical_flow_mean_unit_vector_dt1: Mean unit vector coherence with EMA smoothing (alpha = 0.1)
  ema01_optical_flow_mean_unit_vector_fast_dt1: Mean unit vector coherence over fast pixels with EMA
    smoothing (alpha = 0.1)
  ema02_optical_flow_mean_unit_vector_dt1: Mean unit vector coherence with EMA smoothing (alpha = 0.2)
  ema02_optical_flow_mean_unit_vector_fast_dt1: Mean unit vector coherence over fast pixels with EMA
    smoothing (alpha = 0.2)
  ema01_optical_flow_radial_coherence_dt1: Radial coherence with EMA smoothing (alpha = 0.1)
  ema01_optical_flow_radial_coherence_weighted_dt1: Distance-weighted radial coherence with EMA smoothing
    (alpha = 0.1)
