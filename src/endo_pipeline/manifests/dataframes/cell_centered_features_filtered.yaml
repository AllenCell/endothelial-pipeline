name: cell_centered_features_filtered
workflow: combine_cell_centered_features
parameters: {}
columns:
  frame_number: Timepoint (unit = frames)
  track_id: Track ID assigned by the tracking algorithm
  dataset: Name of dataset
  position: Zarr file position (FOV) of the corresponding segmentation or patch (crop)
  zarr_path: Path to Zarr file for image that patch (crop) comes from
  label: Cell segmentation ID (different from track ID, and may change between timepoints)
  centroid: Centroid of the cell segmentation in (Y,X) pixel coordinates
  area_px_squared: Area of the cell segmentation in pixels squared
  perimeter_px: Perimeter of the cell segmentation in pixels
  solidity: Solidity of the cell (ratio of the cell area to the area of its convex hull)
  major_axis_length: Length of the minor axis of an ellipse fit to the cell segmentation
  minor_axis_length: Length of the minor axis of an ellipse fit to the cell segmentation
  eccentricity: Eccentricity of ellipse fit to cell segmentation (focal distance divided by major axis)
  orientation: Orientation of the cell in radians from 0 (along +x axis) to pi (along -x axis)
  cell_fluorescence_mean_au: Mean of mEGFP-tagged VE-cadherin fluorescence (a.u.) in cytoplasmic region
    of cell segmentation
  cell_fluorescence_std_au: Standard deviation of mEGFP-tagged VE-cadherin fluorescence (a.u.) in cytoplasmic
    region of cell segmentation
  neighboring_cell_labels: Cell segmentation labels of adjacent cell segmentations
  is_edge_segmentation: True if segmentation touches edge of the image, False otherwise
  nuclei_seg_with_most_overlap_0: ''
  nuc_with_most_overlap_0_centroid_Y: ''
  nuc_with_most_overlap_0_centroid_X: ''
  nuclei_seg_with_most_overlap_1: ''
  nuc_with_most_overlap_1_centroid_Y: ''
  nuc_with_most_overlap_1_centroid_X: ''
  total_nuclei_count_at_T: Total number of nuclei present at the timepoint of interest
  nuclei_seg_with_most_overlap_2: ''
  nuc_with_most_overlap_2_centroid_Y: ''
  nuc_with_most_overlap_2_centroid_X: ''
  nuclei_seg_with_most_overlap_3: ''
  nuc_with_most_overlap_3_centroid_Y: ''
  nuc_with_most_overlap_3_centroid_X: ''
  nuclei_seg_with_most_overlap_4: ''
  nuc_with_most_overlap_4_centroid_Y: ''
  nuc_with_most_overlap_4_centroid_X: ''
  nuclei_seg_with_most_overlap_5: ''
  nuc_with_most_overlap_5_centroid_Y: ''
  nuc_with_most_overlap_5_centroid_X: ''
  shear_stress_regime: Experimentalist categorization of the shear stress response
  time_resolution_minutes: Time resolution of the timelapse in minutes
  time_minutes: Time in minutes since the start of the timelapse
  time_hours: Time in hours since the start of the timelapse
  num_unique_tracks_before_filtering_at_T: Number of unique tracks that are present at the timepoint
    of interest before filtering
  track_duration: Number of timepoints in the track
  alignment: Alignment of the cell relative to flow in radians from 0 (parallel) to pi (perpendicular)
  alignment_deg: Alignment of the cell relative to flow in degrees from 0 (parallel) to 90 (perpendicular)
  orientation_deg: Orientation of the cell in degrees from 0 (along +x axis) to 180 (along -x axis)
  nematic_order: Nematic order of ellipse fit to cell segmentation from -1 (perpendicular) to 1 (parallel)
  aspect_ratio: Aspect ratio of ellipse fit to cell segmentation (major axis divided by minor axis)
  pixel_size_xy_in_um: Size of a pixel in the XY dimensions in microns
  area_um_squared: Area of the cell segmentation in microns squared
  perimeter_um: Perimeter of the cell segmentation in microns
  edge_fluorescence_mean_au: Mean fluorescence (a.u.) at junctions between 2 cell segmentations (edge)
  edge_fluorescence_std_au: Standard deviation of fluorescence (a.u.) at junctions between 2 cell segmentations
    (edge)
  node_fluorescence_mean_au: Mean fluorescence (a.u.) at junctions between 3 or more cell segmentations
    (node)
  node_fluorescence_std_au: Standard deviation of fluorescence (a.u.) at junctions between 3 or more
    cell segmentations (node)
  edge_and_node_fluorescence_mean_au: Mean fluorescence (a.u.) of cell segmentation edges and nodes
  edge_and_node_fluorescence_std_au: Standard deviation of fluorescence (a.u.) of cell segmentation
    edges and nodes
  number_of_neighbors: Number of unique cell segmentations that are adjacent to this one
  image_size_x: Size of the whole image in the X dimension in pixels
  image_size_y: Size of the whole image in the Y dimension in pixels
  centroid_y: Centroid Y coordinate in pixels
  centroid_x: Centroid X coordinate in pixels
  nuclei_position_x: X coordinate of the label-free nuclei prediction centroid in pixels
  nuclei_position_y: Y coordinate of the label-free nuclei prediction centroid in pixels
  nuclei_position_distance: Distance between nucleus centroid and cell segmentation centroid in pixels
  nuclei_position_angle: Angle of nucleus centroid from cell centroid relative to flow in radians with
    0 along +x and pi/-pi along -x
  nuclei_position_angle_deg: Angle of nucleus centroid from cell centroid relative to flow in degrees
    with 0 along +x and 180/-180 along -x
  crop_size: Size of the crop in pixels at resolution level 0
  start_x_resolution_0: X-coordinate of upper left corner of patch (crop) in pixels (zarr resolution
    level 0)
  start_y_resolution_0: Y-coordinate of upper left corner of patch (crop) in pixels (zarr resolution
    level 0)
  end_x_resolution_0: X-coordinate of lower right corner of patch (crop) in pixels (zarr resolution
    level 0)
  end_y_resolution_0: Y-coordinate of lower right corner of patch (crop) in pixels (zarr resolution
    level 0)
  bbox_is_in_bounds: True if crop/cell-centered patch fits in to the larger image without being clipped
  num_nuclei_in_crop: Number of label-free predicted nuclei in a crop/cell-centered patch
  all_labels_in_crop: List of all segmentation labels found within a crop/cell-centered patch
  is_greater_than_min_track_duration: True if track duration exceeds minimum threshold, False otherwise
  is_less_than_max_smoothed_area_normd_change: True if change in Gaussian-smoothed cell segmentation
    area is less than threshold, False otherwise
  is_included: True if track passes all filtering criteria and is included in final dataset, False otherwise
  has_more_than_min_num_valid_points_per_track: True if track has sufficient number of timepoints passing
    all other filters, False otherwise
  num_unique_tracks_after_filtering_at_T: Number of unique tracks that pass filtering criteria at the
    timepoint of interest
  auto_bf_scope_error: True if timepoint was automatically flagged with brightfield channel error, False
    otherwise
  auto_bf_temp_artifact: True if timepoint was automatically flagged with brightfield channel suddenly
    becoming too bright or too dark, False otherwise
  auto_gfp_scope_error: True if timepoint was automatically flagged with 488 channel (VE-cadherin-mEGFP)
    error, False otherwise
  bf_scope_error: True if timepoint was manually determined with brightfield channel error, False otherwise
  cell_piling: True if there is considered to be cell piling at this timepoint, False otherwise
  gfp_scope_error: True if timepoint was manually determined with 488 channel (VE-cadherin-mEGFP) error,
    False otherwise
  not_steady_state: True if cells have not yet reached steady state, False if they have
  shear_stress: Shear stress value in dyn/cm^2
  time_hours_since_flow_start: Time in hours since cells first experienced a shear stress
  start_y: Y-coordinate of upper left corner of patch (crop) in pixels (zarr resolution level 1)
  start_x: X-coordinate of upper left corner of patch (crop) in pixels (zarr resolution level 1)
  end_y: Y-coordinate of lower right corner of patch (crop) in pixels (zarr resolution level 1)
  end_x: X-coordinate of lower right corner of patch (crop) in pixels (zarr resolution level 1)
  crop_index: Unique integer index of a patch (crop) trajectory across dataset, FOV, and XY-position
  pc_1: Component 1 of PCA-transformed latent vector
  pc_2: Component 2 of PCA-transformed latent vector
  pc_3: Component 3 of PCA-transformed latent vector
