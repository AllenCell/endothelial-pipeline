name: bootstrapped_fixed_points_grid_based
workflow: bootstrap_fixed_points
parameters:
  model_manifest_name: diffae_baseline
  run_name: latent_512
  patch_type: grid_based
  kernels:
  - column: polar_theta
    name: periodic
    bandwidth: 0.15
    period: 3.141592653589793
  - column: polar_r
    name: gaussian
    bandwidth: 0.15
    period: null
  - column: rho
    name: gaussian
    bandwidth: 0.15
    period: null
  bin_widths: [0.05, 0.05, 0.05]
  num_bootstrap_iterations: 500
columns:
  dataset: Name of dataset
  stability: Stability classification of a fixed point
  polar_theta_baseline: Baseline fixed point location in theta
  polar_r_baseline: Baseline fixed point location in r
  rho_baseline: Baseline fixed point location in rho
  polar_theta_cluster_mean: Mean coordinate of matched bootstrap fixed points in theta
  polar_r_cluster_mean: Mean coordinate of matched bootstrap fixed points in r
  rho_cluster_mean: Mean coordinate of matched bootstrap fixed points in rho
  polar_theta_ci_lower: Lower bound of bootstrap confidence interval for theta
  polar_theta_ci_upper: Upper bound of bootstrap confidence interval for theta
  polar_r_ci_lower: Lower bound of bootstrap confidence interval for r
  polar_r_ci_upper: Upper bound of bootstrap confidence interval for r
  rho_ci_lower: Lower bound of bootstrap confidence interval for rho
  rho_ci_upper: Upper bound of bootstrap confidence interval for rho
  detection_rate: Fraction of bootstrap iterations in which a matched fixed point
    was found
  shear_stress: Shear stress value [dyn/cm^2]
