      - ${model.image_shape[1]}
      - ${model.image_shape[2]}
      pad_mode: null
      overlap: 0
    merger_cls: cyto_dl.models.im2im.utils.inferers.EmbeddingPatchMerger
    spatial_dims: 2
    batch_size: 1000
