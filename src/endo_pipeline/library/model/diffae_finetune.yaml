  model_checkpoint:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: null
    filename: epoch_{epoch:03d}
    monitor: null
    verbose: false
    save_last: true
    save_top_k: 1
    mode: min
    auto_insert_metric_name: false
    save_weights_only: false
    every_n_train_steps: null
    train_time_interval: null
    every_n_epochs: 1
    save_on_train_epoch_end: null
  model_summary: null
  rich_progress_bar:
    _target_: lightning.pytorch.callbacks.RichProgressBar
  prediction_saver:
    _target_: cyto_dl.callbacks.tabular_saver.SaveTabularData
    save_dir: ${callbacks.model_checkpoint.dirpath}
    meta_keys:
    - start_x
    - start_y
    - filename_or_obj
  latent_walk:
    _target_: cyto_dl.callbacks.latent_walk_diffae.DiffAELatentWalk
    every_n_epoch: ${model.save_images_every_n_epochs}
    n_noise_samples: 1
    n_steps: 5
    average: false
  grad_monitor:
    _target_: cyto_dl.callbacks.grad_monitor.GradientLoggingCallback
