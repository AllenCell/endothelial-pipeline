data:
  train_dataloaders:
    _target_: monai.data.DataLoader
    num_workers: 8
    batch_size: 1
    pin_memory: true
    persistent_workers: false
    shuffle: true
    dataset:
      _target_: endo_pipeline.library.model.image_loading.MultiDimImageDataset
      dataframe_path: null
      spatial_dims: 2
      transform:
        _target_: monai.transforms.Compose
        transforms:
        - _target_: endo_pipeline.library.model.image_loading.BioIOImageLoaderd
          path_key: original_path
          out_key: raw
          dask_load: false
          dtype: numpy.float32
        - _target_: monai.transforms.SplitDimd
          keys: raw
          output_postfixes:
          - fixed
          - moving
        - _target_: monai.transforms.DeleteItemsd
          keys:
          - raw
        - _target_: endo_pipeline.library.model.image_loading.LogImaged
          keys:
          - raw_fixed
          - raw_moving
        - _target_: cyto_dl.image.transforms.clip.Clipd
          keys:
          - raw_fixed
          - raw_moving
          low: 0.1
          high: 99.9
        - _target_: monai.transforms.NormalizeIntensityd
          keys:
          - raw_fixed
          - raw_moving
        - _target_: monai.transforms.RandSpatialCropSamplesd
          keys:
          - raw_fixed
          - raw_moving
          roi_size:
          - ${model.image_shape[1]}
          - ${model.image_shape[2]}
          random_size: false
          num_samples: 8
        - _target_: monai.transforms.ToTensord
          keys:
          - raw_fixed
          - raw_moving
          dtype: float16
        - _target_: monai.transforms.RandStdShiftIntensityd
          keys:
          - raw_fixed
          - raw_moving
          prob: 0.5
          factors: 5
        - _target_: monai.transforms.RandGaussianNoised
          keys:
          - raw_fixed
          - raw_moving
          prob: 0.5
          std: 0.1
          mean: 0
        - _target_: monai.transforms.RandFlipd
          keys:
          - raw_fixed
          - raw_moving
          prob: 0.5
          spatial_axis: 0
        - _target_: monai.transforms.RandFlipd
          keys:
          - raw_fixed
          - raw_moving
          prob: 0.5
          spatial_axis: 1
        - _target_: monai.transforms.RandRotate90d
          keys:
          - raw_fixed
          - raw_moving
          prob: 0.5
          max_k: 3
      cache_rate: 1.0
      replace_rate: 0.1
      num_init_workers: 24
      num_replace_workers: 24
  predict_dataloaders:
