experiment_name: endo_diffae
run_name: diffae_finetune
task_name: train
tags:
- dev
model:
  _target_: endo_pipeline.library.model.DiffAEFinetune
  save_images_every_n_epochs: 10
  save_dir: null
  image_shape:
  - 1
  - 128
  - 128
  n_noise_samples: 1
  n_inference_steps: 50
  condition_key: raw_moving
  paired_condition_key: raw_fixed
  train_encoder: true
  gamma: 5.0
  loss:
    _target_: torch.nn.MSELoss
    reduction: none
  semantic_encoder:
    _target_: cyto_dl.nn.TorchVisionWrapper
    in_channels: 1
    base_encoder:
      _target_: torchvision.models.convnext_tiny
      num_classes: 8
  autoencoder:
    _target_: monai.networks.nets.diffusion_model_unet.DiffusionModelUNet
    spatial_dims: 2
    in_channels: 1
    out_channels: 1
    channels:
    - 32
    - 64
    - 128
    attention_levels:
    - false
    - true
    - true
    num_res_blocks: 1
    num_head_channels: 16
    with_conditioning: true
    cross_attention_dim: 1
    use_combined_linear: false
  noise_scheduler:
