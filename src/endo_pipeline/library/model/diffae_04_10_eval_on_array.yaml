task_name: eval
tags:
- dev
checkpoint:
  ckpt_path: //allen/aics/assay-dev/users/Benji/CurrentProjects/im2im_dev/cyto-dl/logs/train/runs/diffae/soda_schedule_small_latent_small_unet/2025-02-07_11-02-53/checkpoints/last_mod.ckpt
  weights_only: null
  strict: true
seed: 12345

model:
  _target_: cyto_dl.models.im2im.diffusion_autoencoder.DiffusionAutoEncoder
  save_images_every_n_epochs: 10
  save_dir: ${paths.output_dir}
  image_shape:
  - 1
  - 128
  - 128
  n_noise_samples: 1
  condition_key: raw_bf
  # diffusion_key: raw_cdh5
  gamma: 5.0
  loss:
    _target_: torch.nn.MSELoss
    reduction: none
  train_encoder: false
  semantic_encoder:
    _target_: cyto_dl.nn.TorchVisionWrapper
    in_channels: 1
    base_encoder:
      _target_: torchvision.models.convnext_tiny
      num_classes: 8
  autoencoder:
    _target_: monai.networks.nets.diffusion_model_unet.DiffusionModelUNet
    spatial_dims: 2
    in_channels: 1
    out_channels: 1
    channels:
    - 32
    - 64
    - 128
    attention_levels:
    - false
    - true
    - true
    num_res_blocks: 1
    num_head_channels: 16
    with_conditioning: true
    cross_attention_dim: 1
    use_combined_linear: false
  noise_scheduler:
    _target_: monai.networks.schedulers.ddim.DDIMScheduler
    num_train_timesteps: 1000
  optimizer:
    _partial_: true
    _target_: torch.optim.AdamW
    lr: 0.0001
  lr_scheduler:
    _partial_: true
    _target_: torch.optim.lr_scheduler.OneCycleLR
    max_lr: 0.0001
    epochs: 1
    steps_per_epoch: 1
    pct_start: 0.01
  diffusion_inferer:
    _target_: monai.inferers.DiffusionInferer
    _partial_: true
  spatial_inferer: null
    # _target_: cyto_dl.models.im2im.utils.inferers.EmbeddingPatchInferer
    # splitter:
    #   _target_: monai.inferers.SlidingWindowSplitter
    #   patch_size:
    #   - 128
    #   - 128
    #   pad_mode: null
    #   overlap: 0
    # merger_cls: cyto_dl.models.im2im.utils.inferers.EmbeddingPatchMerger
    # spatial_dims: 2
    # batch_size: 1000
# model/params/total: 31865609
# model/params/trainable: 4042401
# model/params/non_trainable: 27823208
data:
  _target_: cyto_dl.datamodules.array.make_array_dataloader
  data:
  num_workers: 1
  batch_size: 1
  source_key: raw_bf

  transforms:
    _target_: monai.transforms.Compose
    transforms:
    - _target_: cyto_dl.image.transforms.clip.Clipd
      keys:
      - raw_bf
      low: 0.1
      high: 99.9
    - _target_: monai.transforms.NormalizeIntensityd
      keys:
      - raw_bf
    - _target_: monai.transforms.ToTensord
      keys:
      - raw_bf
      dtype: float16
