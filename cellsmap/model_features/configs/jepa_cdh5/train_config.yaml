experiment_name: endo_time
run_name: jepa
task_name: train
tags:
- dev
train: true
test: true
ckpt_path: null
seed: 12345
data:
  _target_: cyto_dl.datamodules.dataframe.DataframeDatamodule
  path: //allen/aics/assay-dev/users/Benji/CurrentProjects/im2im_dev/cyto-dl/data/endo_time_contrastive
  cache_dir: /storage/benji.the.kid/cache/endo_time_vicreg
  num_workers: 0
  batch_size: 8
  pin_memory: true
  persistent_workers: false
  split_column: null
  columns: null
  transforms:
    train:
      _target_: monai.transforms.Compose
      transforms:
      - _target_: monai.transforms.LoadImaged
        keys:
        - raw
        reader:
        - _target_: cyto_dl.image.io.MonaiBioReader
          dimension_order_out: CYX
          dask_load: false
      - _target_: monai.transforms.NormalizeIntensityd
        keys: raw
      - _target_: monai.transforms.ToTensord
        keys:
        - raw
        dtype: float16
      - _target_: monai.transforms.RandSpatialCropSamplesd
        keys: raw
        roi_size:
        - 512
        - 512
        random_size: false
        num_samples: 64
      - _target_: cyto_dl.image.transforms.generate_jepa_masks.JEPAMaskGenerator
        num_patches:
        - 32
        - 32
      - _target_: monai.transforms.RandFlipd
        keys:
        - raw
        spatial_axis: 0
        prob: 0.5
      - _target_: monai.transforms.RandFlipd
        keys:
        - raw
        spatial_axis: 1
        prob: 0.5
      - _target_: monai.transforms.RandRotate90d
        keys:
        - raw
        spatial_axes:
        - 0
        - 1
        prob: 0.5
    test:
      _target_: monai.transforms.Compose
    predict:
      _target_: monai.transforms.Compose
      transforms:
      - _target_: monai.transforms.CopyItemsd
        keys: raw
        times: 1
        names:
        - filename
      - _target_: monai.transforms.LoadImaged
        keys:
        - raw
        reader:
        - _target_: cyto_dl.image.io.MonaiBioReader
          dimension_order_out: CZYX
          C: 0
          dask_load: false
      - _target_: monai.transforms.ToTensord
        keys:
        - raw
        dtype: float16
      - _target_: monai.transforms.Zoomd
        keys: raw
        zoom: 0.5
        keep_size: false
    valid:
      _target_: monai.transforms.Compose
      transforms:
      - _target_: monai.transforms.LoadImaged
        keys:
        - raw
        reader:
        - _target_: cyto_dl.image.io.MonaiBioReader
          dimension_order_out: CYX
          dask_load: false
      - _target_: monai.transforms.NormalizeIntensityd
        keys: raw
      - _target_: monai.transforms.ToTensord
        keys:
        - raw
        dtype: float16
      - _target_: monai.transforms.RandSpatialCropSamplesd
        keys: raw
        roi_size:
        - 512
        - 512
        random_size: false
        num_samples: 64
      - _target_: cyto_dl.image.transforms.generate_jepa_masks.JEPAMaskGenerator
        num_patches:
        - 32
        - 32
  _aux:
    patch_shape:
    - 512
    - 512
model:
  _target_: cyto_dl.models.jepa.ijepa.IJEPA
  x_key: raw
  max_epochs: ${trainer.max_epochs}
  save_dir: ${paths.output_dir}
  encoder:
    _target_: cyto_dl.nn.vits.jepa.JEPAEncoder
    num_patches: ${model._aux.num_patches}
    patch_size:
    - 16
    - 16
    emb_dim: 256
    num_head: 8
    num_layer: 4
    spatial_dims: 2
  predictor:
    _target_: cyto_dl.nn.vits.jepa.JEPAPredictor
    num_patches: ${model._aux.num_patches}
    input_dim: ${model.encoder.emb_dim}
    emb_dim: 128
    num_layer: 8
    num_head: 4
  optimizer:
    _partial_: true
    _target_: torch.optim.AdamW
    weight_decay: 0.05
  lr_scheduler:
    _partial_: true
    _target_: torch.optim.lr_scheduler.OneCycleLR
    max_lr: 0.003
    epochs: ${trainer.max_epochs}
    steps_per_epoch: 1
    pct_start: 0.1
  _aux:
    num_patches:
    - 32
    - 32
callbacks:
  model_checkpoint:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: ${paths.output_dir}/checkpoints
    filename: epoch_{epoch:03d}
    monitor: val/loss
    verbose: false
    save_last: true
    save_top_k: 1
    mode: min
    auto_insert_metric_name: false
    save_weights_only: false
    every_n_train_steps: null
    train_time_interval: null
    every_n_epochs: 1
    save_on_train_epoch_end: null
  early_stopping:
    _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: val/loss
    min_delta: 0.0
    patience: 100
    verbose: false
    mode: min
    strict: true
    check_finite: true
    stopping_threshold: null
    divergence_threshold: null
    check_on_train_epoch_end: null
  model_summary:
    _target_: lightning.pytorch.callbacks.RichModelSummary
    max_depth: -1
  rich_progress_bar:
    _target_: lightning.pytorch.callbacks.RichProgressBar
logger:
  mlflow:
    _target_: cyto_dl.loggers.MLFlowLogger
    tracking_uri: https://mlflow.a100.int.allencell.org/
    experiment_name: ${experiment_name}
    run_name: ${run_name}
trainer:
  _target_: lightning.Trainer
  default_root_dir: ${paths.output_dir}
  min_epochs: 1
  max_epochs: 1000
  accelerator: gpu
  devices:
  - 0
  precision: 16
  check_val_every_n_epoch: 10
  deterministic: false
  detect_anomaly: false
  max_time: null
  gradient_clip_val: 5
paths:
  root_dir: ${oc.env:PROJECT_ROOT, './'}
  data_dir: ${paths.root_dir}/data/
  log_dir: ${paths.root_dir}/logs/
  output_dir: ${hydra:runtime.output_dir}
  work_dir: ${hydra:runtime.cwd}
extras:
  ignore_warnings: true
  enforce_tags: true
  print_config: true
  precision:
    _target_: torch.set_float32_matmul_precision
    precision: medium
persist_cache: true
