experiment_name: endo_time
run_name: vicreg
task_name: train
tags:
- dev
train: true
test: false
checkpoint:
  ckpt_path: "//allen/aics/assay-dev/users/Benji/CurrentProjects/im2im_dev/cyto-dl/logs/train/runs/endo_time/vicreg_no_flip/2024-07-19_15-22-51/checkpoints/epoch_889.ckpt"
  weights_only: null
  strict: True
seed: 12345
data:
  _target_: cyto_dl.datamodules.array.make_array_dataloader
  data:
  num_workers: 1
  batch_size: 1
  source_key: raw
  transforms: 
    - _target_: monai.transforms.NormalizeIntensityd
      subtrahend: 116
      divisor: 9.5
      keys: raw
    - _target_: monai.transforms.ToTensord
      keys: raw
      dtype: float16

model:
  _target_: cyto_dl.models.contrastive.contrastive.Contrastive
  save_dir: ${paths.output_dir}
  anchor_key: raw
  positive_key: raw_aug
  backbone:
    _target_: monai.networks.nets.Regressor
    in_shape:
    - 1
    - 512
    - 512
    out_shape: 256
    channels:
    - 32
    - 64
    - 96
    - 128
    - 160
    - 192
    strides:
    - 2
    - 2
    - 2
    - 2
    - 2
    - 2
    kernel_size: 3
  task_head:
    _target_: cyto_dl.nn.head.vic_reg.VICRegHead
    loss:
      _target_: cyto_dl.nn.losses.vic_reg.VICRegLoss
      num_features: 256
    dims:
    - 256
    - 1024
    hidden_layers:
    - 1024
    - 1024
    - 1024
    - 1024
  optimizer:
    _partial_: true
    _target_: torch.optim.AdamW
    weight_decay: 0.01
  lr_scheduler:
    _partial_: true
    _target_: torch.optim.lr_scheduler.OneCycleLR
    max_lr: 0.0001
    epochs: ${trainer.max_epochs}
    steps_per_epoch: 1
    pct_start: 0.02
callbacks:
logger:
trainer:
  _target_: lightning.Trainer
  default_root_dir: ${paths.output_dir}
  min_epochs: 1
  max_epochs: 1000
  accelerator: gpu
  devices:
  - 0
  precision: 16
  check_val_every_n_epoch: 10
  deterministic: false
  detect_anomaly: false
  max_time: null
  gradient_clip_val: 5
paths:
  root_dir: ${oc.env:PROJECT_ROOT, './'}
  data_dir: ${paths.root_dir}/data/
  log_dir: ${paths.root_dir}/logs/
  output_dir: ./
extras:
  ignore_warnings: true
  enforce_tags: false
  print_config: false
  precision:
    _target_: torch.set_float32_matmul_precision
    precision: medium
persist_cache: true
