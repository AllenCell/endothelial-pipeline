experiment_name: endo_time
run_name: mae_seg
task_name: train
tags:
- dev
train: true
test: false
checkpoint:
  ckpt_path: "//allen/aics/assay-dev/users/Benji/CurrentProjects/im2im_dev/cyto-dl/logs/train/runs/endo_time/mae_seg/2024-08-30_15-20-06/checkpoints/epoch_969.ckpt"
  weights_only: null
  strict: true
seed: 12345
data:
  _target_: cyto_dl.datamodules.dataframe.DataframeDatamodule
  path: "//allen/aics/assay-dev/users/Benji/CurrentProjects/im2im_dev/cyto-dl/logs/eval/runs/endo_time/seg_serge_improved/2024-08-30_14-56-14/manifests_inference/test.csv"
  cache_dir: /storage/benji.the.kid/cache/endo_time_seg
  num_workers: 4
  batch_size: 1
  pin_memory: true
  persistent_workers: false
  split_column: split
  columns: null
  transforms:
    train:
      _target_: monai.transforms.Compose
    test:
      _target_: monai.transforms.Compose
    predict:
      _target_: monai.transforms.Compose
      transforms:
      - _target_: monai.transforms.LoadImaged
        keys:
        - raw
        reader:
        - _target_: cyto_dl.image.io.MonaiBioReader
          dimension_order_out: CYX
          C: 0
          dask_load: false
      - _target_: cyto_dl.image.transforms.add_meta.AddMeta
        image_key: raw
        meta_keys:
        - T
      - _target_: monai.transforms.ToTensord
        keys:
        - raw
        dtype: float16
      - _target_: monai.transforms.GridSplitd
        keys: raw
        grid: [3, 18]
        size: [512, 512]
    valid:
      _target_: monai.transforms.Compose
model:
  _target_: cyto_dl.models.contrastive.Contrastive
  anchor_key: raw
  backbone:
    _target_: cyto_dl.nn.vits.MAE
    spatial_dims: 2
    patch_size:
    - 16
    - 16
    num_patches:
    - 32
    - 32
    emb_dim: 256
    encoder_layer: 16
    encoder_head: 8
    decoder_layer: 4
    decoder_dim: 128
    mask_ratio: 0
    features_only: True
    use_crossmae: true
    learnable_pos_embedding: false
  optimizer:
    generator:
      _partial_: true
      _target_: torch.optim.AdamW
      weight_decay: 0.05
  lr_scheduler:
    generator:
      _partial_: true
      _target_: torch.optim.lr_scheduler.OneCycleLR
      max_lr: 0.0001
      epochs: ${trainer.max_epochs}
      steps_per_epoch: 1
      pct_start: 0.1
callbacks:
  csv_saver:
    _target_: cellsmap.model_features.utils.csv_saver.MAESaver
    save_dir: ${paths.output_dir}
    meta_keys: ['T']
logger:
trainer:
  _target_: lightning.Trainer
  default_root_dir: ${paths.output_dir}
  min_epochs: 1
  max_epochs: 1000
  accelerator: gpu
  devices:
  - 0
  precision: 16
  check_val_every_n_epoch: 10
  deterministic: false
  detect_anomaly: false
  max_time: null
  gradient_clip_val: 5
paths:
  root_dir: ${oc.env:PROJECT_ROOT, './'}
  data_dir: ${paths.root_dir}/data/
  log_dir: ${paths.root_dir}/logs/
  output_dir: 
extras:
  ignore_warnings: true
  enforce_tags: true
  print_config: true
  precision:
    _target_: torch.set_float32_matmul_precision
    precision: medium
persist_cache: true
